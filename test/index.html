<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
      <title>Population Map</title>
      
        <!-- Leaflet CSS -->
          <link
              rel="stylesheet"
                  href="https://unpkg.com/leaflet/dist/leaflet.css"
                    />
                    

                       </head>
                       
                       <body>
<div id="legend" class="legend hidden">
  <div><span class="dot pol"></span> POL only</div>
  <div><span class="dot obs"></span> OBS only</div>
  <div><span class="dot both"></span> Both</div>
</div>
<div id="controls">
<div class="search-box">
  <input
    type="text"
    id="searchInput"
    placeholder="Search population ID or name..."
  />
</div>

<h4>Display mode</h4>

<label>
  <input
    type="radio"
    name="displayMode"
    value="moth"
    checked>
  Moths species
</label>

<label>
  <input
    type="radio"
    name="displayMode"
    value="litho">
  Lithophragma Species
</label>
  <div id="mothControls">
  <h4>Moth filter</h4>

  <label>
    <input type="radio" name="mothMode" value="or" checked>
    OR (Any selected species)
  </label>

  <label>
    <input type="radio" name="mothMode" value="and">
    AND (All selected species)
  </label>

  <hr>

  <label>
    <input type="checkbox" id="filterPOL">
    POL
  </label>

  <label>
    <input type="checkbox" id="filterOBS">
    OBS
  </label>
</div>

<div id="lithoControls" class="hidden">
  <h4>Lithophragma filter</h4>

  <label>
    <input type="radio" name="lithoMode" value="or" checked>
    OR (Any selected species)
  </label>

  <label>
    <input type="radio" name="lithoMode" value="and">
    AND (All selected species)
  </label>

  <hr>

  <label>
    <input type="checkbox" id="filterBOL">
    BOL
  </label>

  <label>
    <input type="checkbox" id="filterCYM">
    CYM
  </label>

  <label>
    <input type="checkbox" id="filterGLA">
    GLA
  </label>

  <label>
    <input type="checkbox" id="filterHET">
    HET
  </label>

  <label>
    <input type="checkbox" id="filterAFF">
    AFF
  </label>

  <label>
    <input type="checkbox" id="filterPAR">
    PAR
  </label>

  <label>
    <input type="checkbox" id="filterTRI">
    TRI
  </label>

  <label>
    <input type="checkbox" id="filterCAM">
    CAM
  </label>

  <label>
    <input type="checkbox" id="filterTEN">
    TEN
  </label>

  <label>
    <input type="checkbox" id="filterMAX">
    MAX
  </label>

  <label>
    <input type="checkbox" id="filterTHO">
    THO
  </label>

  <label>
    <input type="checkbox" id="filterAFFm">
    AFFm
  </label>

</div>

  <h4>Sequencing data filter</h4>

  <label class="switch">
  <input type="checkbox" id="filterSequencing">
  <span class="slider"></span>
</label>

<label for="filterSequencing">
  Sequencing data
</label>

  <h4>Article filter</h4>

<label class="switch">
  <input type="checkbox" id="filterPNAS2025">
  <span class="slider"></span>
</label>

<span>PNAS 2025</span>

</div>
                    
                       
                       <div id="map"></div>
                       
                       <!-- Leaflet JS -->
                       <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
                       
                       <script>
  const version = Date.now();

  // load CSS
  const css = document.createElement("link");
  css.rel = "stylesheet";
  css.href = `main_style.css?v=${version}`;
  document.head.appendChild(css);

  // load JS
  const script = document.createElement("script");
  script.src = `data_map.js?v=${version}`;
  document.body.appendChild(script);
</script>
                       
                       </body>
                       </html>
