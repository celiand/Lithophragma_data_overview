<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Population Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // Create map
  const map = L.map('map').setView([40, -100], 3);

  // Add OpenStreetMap tiles
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // data
  const populations = [
  {
    id: "ORE",
    name: "Oregon Creek",
    lat: 39.397,
    lon: -121.077,
    elevation: 507,

    site: {
      mothPresence: "N/A",
      morphologicalData: true,
      scentData: true
    },

    sequencing: {
      diploid_BOL: 10,
      tetraploid_BOL: 2
    }
  },

  {
    id: "RID",
    name: "Riverdale Site",
    lat: 44.052,
    lon: -123.086,
    elevation: 180,

    site: {
      mothPresence: "POL",
      morphologicalData: false,
      scentData: true
    },

    sequencing: {
      diploid_BOL: 6,
      tetraploid_BOL: 0
    }
  }
];

  populations.forEach(pop => {

  const marker = L.marker([pop.lat, pop.lon]).addTo(map);

  marker.bindPopup(`
    <h3>${pop.name}</h3>

    <b>Site characteristics</b><br>
    Short name: ${pop.id}<br>
    Latitude: ${pop.lat}<br>
    Longitude: ${pop.lon}<br>
    Elevation: ${pop.elevation} m<br>

    <br>

    <b>Moth presence</b><br>
    ${pop.site.mothPresence}<br>

    <br>

    <b>Sequencing</b><br>
    Diploid BOL: ${pop.sequencing.diploid_BOL}<br>
    Tetraploid BOL: ${pop.sequencing.tetraploid_BOL}<br>

    <br>

    <b>Phenotypic data</b><br>
    Morphological data: ${pop.site.morphologicalData ? "Yes" : "No"}<br>
    Scent data: ${pop.site.scentData ? "Yes" : "No"}<br>
  `);

});
</script>

</body>
</html>
