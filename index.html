<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    
      <title>Population Map</title>
      
        <!-- Leaflet CSS -->
          <link
              rel="stylesheet"
                  href="https://unpkg.com/leaflet/dist/leaflet.css"
                    />
                    

                       </head>
                       
                       <body>
<div id="controls">

  <h4>Moth filter mode</h4>

  <label>
    <input type="radio" name="mothMode" value="or" checked>
    OR (any match)
  </label>

  <label>
    <input type="radio" name="mothMode" value="and">
    AND (must have all selected)
  </label>

  <hr>

  <label>
    <input type="checkbox" id="filterPOL">
    POL
  </label>

  <label>
    <input type="checkbox" id="filterOBS">
    OBS
  </label>

</div>
                    
                       
                       <div id="map"></div>
                       
                       <!-- Leaflet JS -->
                       <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
                       
                       <script>
  const version = Date.now();

  // load CSS
  const css = document.createElement("link");
  css.rel = "stylesheet";
  css.href = `main_style.css?v=${version}`;
  document.head.appendChild(css);

  // load JS
  const script = document.createElement("script");
  script.src = `data_map.js?v=${version}`;
  document.body.appendChild(script);
</script>
                       
                       </body>
                       </html>
