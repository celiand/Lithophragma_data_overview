<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Population Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }
  </style>
</head>

<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  // Create map
  const map = L.map('map').setView([48.8566, 2.3522], 5);

  // Add OpenStreetMap tiles
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Add one marker
  const marker = L.marker([39.397, -121.077]).addTo(map);

  // Popup
  marker.bindPopup(`
    <h4>Oregon Creek</h4><br>
    <br>
    <b>Site caracteristics</b><br>
    Short name: ORE<br>
    Latitude: 39.397
    Longitude: -121.077
    Elevation: 507
    <br>
    <b>Moth presence*</b><br>
    N/A
    <br>
    <b>Sequenced individual**</b><br>
    - Diploid BOL: 10 (long reads)<br>
    - Tetraploid BOL: 2 (long reads)<br>
    <br>
    <b>Phenotypic Data</b><br>
    Morphological data: Yes<br>
    Scent Data: Yes<br>
    <br>
    <br>
    *POL = G.politella ; OBS = G.obscura
    **BOL = L. bolanderi, CYM = L. cymbalaria, GLA = L. glabrum, HET = L. heterophyllum
  `);

</script>

</body>
</html>
